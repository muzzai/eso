apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: {{ .Values.secretStore.name }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  provider:
    vault:
      server: {{ .Values.vault.server | quote }}
      path: {{ .Values.vault.mountPath | quote }}
      version: {{ .Values.vault.kvVersion | quote }}
      caProvider:
        type: Secret
        name: {{ .Values.vault.caSecretName | quote }}
        key: {{ .Values.vault.caSecretKey | quote }}
        namespace: "default"
      auth:
        appRole:
          path: {{ .Values.vault.approleMountPath | quote }}
          roleRef:
            name: {{ .Values.vault.approleSecretName | quote }}
            namespace: "default"
            key: "role-id"
          secretRef:
            name: {{ .Values.vault.approleSecretName | quote }}
            namespace: "default"
            key: "secret-id"
