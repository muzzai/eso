apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: {{ .Values.secretStore.name }}
  namespace: {{ .Values.secretStore.namespace }}
  labels:
    {{- include "eso.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  provider:
    vault:
      server: {{ .Values.vault.server | quote }}
      path: {{ .Values.vault.mountPath | quote }}
      version: {{ .Values.vault.kvVersion | quote }}
      caProvider:
        type: "Secret"
        name: {{ .Values.vault.caSecretName | quote }}
        namespace: {{ .Values.secretStore.namespace | quote }}
        key: {{ .Values.vault.caSecretKey | quote }}
      auth:
        appRole:
          path: {{ .Values.vault.approleMountPath | quote }}
          roleRef:
            name: {{ .Values.vault.approleSecretName | quote }}
            key: "role-id"
          secretRef:
            name: {{ .Values.vault.approleSecretName | quote }}
            key: "secret-id"
