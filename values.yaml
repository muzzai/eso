# -----------------------------------------------
# External Secrets Operator (subchart) settings
# -----------------------------------------------
external-secrets:
  installCRDs: true

# -----------------------------------------------
# AWS SSM Parameter Store settings
# -----------------------------------------------
aws:
  region: "us-east-2"
  # SecretStore for AWS SSM (uses EC2 instance IAM role — no credentials needed)
  secretStoreName: "aws-ssm-backend"
  # SSM parameter paths for Vault AppRole credentials
  ssm:
    roleIdPath: "/monitoring_cluster/app_role_id"
    secretIdPath: "/monitoring_cluster/secret_id"

# -----------------------------------------------
# Vault connection settings
# -----------------------------------------------
vault:
  server: "https://172.31.16.128:8200"
  # KV engine version (v1 or v2)
  kvVersion: "v2"
  # KV mount path in Vault (without /data/)
  mountPath: "secret"
  # Name of the Kubernetes Secret auto-provisioned from AWS SSM
  approleSecretName: "vault-approle-credentials"
  # Vault AppRole auth mount path
  approleMountPath: "approle"
  # --- TLS ---
  # Name of the Secret containing the Vault CA certificate
  # (must be created manually — see README.md)
  caSecretName: "vault-ca-cert"
  # Key inside the Secret that holds the CA certificate
  caSecretKey: "ca.crt"

# -----------------------------------------------
# SecretStore settings
# -----------------------------------------------
secretStore:
  name: "vault-backend"
  namespace: "default"

# -----------------------------------------------
# Grafana ExternalSecret settings
# -----------------------------------------------
grafana:
  namespace: "monitoring"
  secretName: "grafana"
  refreshInterval: "1h"
  vaultSecretPath: "secret/data/grafana"
  # Mapping: Vault key → Kubernetes Secret key
  data:
    - vaultKey: "admin-user"
      secretKey: "admin-user"
    - vaultKey: "admin-password"
      secretKey: "admin-password"
    - vaultKey: "teamsWebHook"
      secretKey: "teamsWebHook"

# -----------------------------------------------
# Ingress ExternalSecret settings
# -----------------------------------------------
ingress:
  namespace: "etc-infra"
  secretName: "ingress-settings"
  refreshInterval: "1h"
  vaultSecretPath: "secret/data/etc-infra"
  # Mapping: Vault key → Kubernetes Secret key
  data:
    - vaultKey: "domain"
      secretKey: "domain"
    - vaultKey: "grafana_hostname"
      secretKey: "grafana_hostname"
    - vaultKey: "logs_hostname"
      secretKey: "logs_hostname"
    - vaultKey: "metrics_hostname"
      secretKey: "metrics_hostname"

